services:
  watcher:
    build:
      context: .
    container_name: pi-alpr-watcher
    restart: unless-stopped
    read_only: true
    mem_limit: 1g
    cpus: "1.50"
    logging:
      driver: ${DOCKER_LOG_DRIVER:-none}
    env_file:
      - ${APP_ENV_FILE:-/mnt/localdisk/pi-alpr/config/.env}
    environment:
      TZ: ${TZ:-Asia/Jerusalem}
      FAST_ALPR_URL: http://fast-alpr:8090
      EVENT_OUTPUT_DIR: ${EVENT_OUTPUT_DIR:-/data/events}
      IMAGE_OUTPUT_DIR: ${IMAGE_OUTPUT_DIR:-/data/events/images}
      VIDEO_OUTPUT_DIR: ${VIDEO_OUTPUT_DIR:-/data/events/videos}
      LOG_OUTPUT_DIR: ${LOG_OUTPUT_DIR:-/data/logs}
      ALPR_ENV_FILE: /app/.env
      HOME: /data/watcher-home
      TMPDIR: /tmp
      PYTHONDONTWRITEBYTECODE: "1"
    ports:
      - "8080:8080"
    volumes:
      - ${HOST_DATA_DIR:-/mnt/localdisk/pi-alpr}:/data
      - ${APP_ENV_FILE:-/mnt/localdisk/pi-alpr/config/.env}:/app/.env
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /run:size=32m,mode=755
    depends_on:
      fast-alpr:
        condition: service_healthy

  fast-alpr:
    build:
      context: ./third_party/fast-alpr-container
    container_name: fast-alpr
    restart: unless-stopped
    read_only: true
    mem_limit: 2g
    cpus: "2.00"
    logging:
      driver: ${DOCKER_LOG_DRIVER:-none}
    ports:
      - "8090:8090"
    environment:
      TZ: ${TZ:-Asia/Jerusalem}
      PORT: "8090"
      FAST_ALPR_OCR_DEVICE: "cpu"
      FAST_ALPR_DETECTOR_CONF: "0.4"
      XDG_CACHE_HOME: /data/fast-alpr-cache
      XDG_CONFIG_HOME: /data/fast-alpr-config
      HOME: /data/fast-alpr-home
      TMPDIR: /tmp
      PYTHONDONTWRITEBYTECODE: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    volumes:
      - ${HOST_DATA_DIR:-/mnt/localdisk/pi-alpr}:/data
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /run:size=32m,mode=755
