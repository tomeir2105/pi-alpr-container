services:
  watcher:
    build:
      context: .
    container_name: pi-alpr-watcher
    restart: unless-stopped
    read_only: true
    mem_limit: 512m
    cpus: "0.50"
    logging:
      driver: ${DOCKER_LOG_DRIVER:-none}
    env_file:
      - ${APP_ENV_FILE:-/mnt/localdisk/pi-alpr/config/.env}
    environment:
      TZ: ${TZ:-Asia/Jerusalem}
      EVENT_OUTPUT_DIR: ${EVENT_OUTPUT_DIR:-/data/events}
      IMAGE_OUTPUT_DIR: ${IMAGE_OUTPUT_DIR:-/data/events/images}
      VIDEO_OUTPUT_DIR: ${VIDEO_OUTPUT_DIR:-/data/events/videos}
      LOG_OUTPUT_DIR: ${LOG_OUTPUT_DIR:-/data/logs}
      ALPR_ENV_FILE: /app/.env
      HOME: /data/watcher-home
      TMPDIR: /tmp
      PYTHONDONTWRITEBYTECODE: "1"
    ports:
      - "8080:8080"
    volumes:
      - ${HOST_DATA_DIR:-/mnt/localdisk/pi-alpr}:/data
      - ${APP_ENV_FILE:-/mnt/localdisk/pi-alpr/config/.env}:/app/.env
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /run:size=32m,mode=755
