services:
  fast-alpr:
    build:
      context: .
    container_name: fast-alpr
    restart: unless-stopped
    read_only: true
    mem_limit: 2g
    cpus: "2.00"
    logging:
      driver: ${DOCKER_LOG_DRIVER:-none}
    ports:
      - "${PORT:-8090}:8090"
    environment:
      TZ: ${TZ:-Asia/Jerusalem}
      PORT: "8090"
      FAST_ALPR_OCR_DEVICE: ${FAST_ALPR_OCR_DEVICE:-cpu}
      FAST_ALPR_DETECTOR_CONF: ${FAST_ALPR_DETECTOR_CONF:-0.4}
      XDG_CACHE_HOME: /data/fast-alpr-cache
      XDG_CONFIG_HOME: /data/fast-alpr-config
      HOME: /data/fast-alpr-home
      TMPDIR: /tmp
      PYTHONDONTWRITEBYTECODE: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    volumes:
      - ${HOST_DATA_DIR:-/mnt/localdisk/pi-alpr}:/data
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /run:size=32m,mode=755
